<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --yellow:#FFD600;
  --yellow-dark:#F5C400;
  --yellow-light:#FFF8CC;
  --black:#111111;
  --grey:#1E1E1E;
  --grey2:#2C2C2C;
  --text-on-black:#F0F0F0;
  --text-muted:#999;
  --correct-bg:#0F3D1F;
  --correct-border:#22c55e;
  --correct-text:#6EE7A0;
  --wrong-bg:#3D0F0F;
  --wrong-border:#ef4444;
  --wrong-text:#FCA5A5;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--black);
  color:var(--text-on-black);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 0 40px 0;
}

/* TITLE HEADER */
.site-header{
  width:100%;
  background:var(--yellow);
  padding:18px 20px 16px;
  text-align:center;
  border-bottom:4px solid var(--black);
}

.site-header h1{
  font-size:clamp(18px, 5vw, 26px);
  font-weight:800;
  color:var(--black);
  letter-spacing:-0.5px;
  line-height:1.2;
}

.site-header p{
  font-size:12px;
  color:rgba(0,0,0,0.55);
  margin-top:4px;
  font-weight:500;
}

/* MAIN CONTENT */
#app{
  width:100%;
  max-width:680px;
  padding:16px 16px 0;
  display:flex;
  flex-direction:column;
}

/* STICKY CONTROLS */
.header{
  position:sticky;
  top:0;
  background:var(--black);
  padding:12px 0 8px;
  z-index:10;
  border-bottom:2px solid var(--grey2);
  margin-bottom:14px;
}

/* SCORE BAR */
.score-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.stat{
  background:var(--grey);
  padding:7px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
  color:var(--yellow);
  border:1px solid var(--grey2);
}

/* CONTROLS */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

button{
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  padding:7px 13px;
  border-radius:8px;
  border:1.5px solid var(--grey2);
  background:var(--grey);
  color:var(--text-on-black);
  transition:all .15s ease;
  -webkit-tap-highlight-color:transparent;
}

button:hover{
  border-color:var(--yellow);
  color:var(--yellow);
}

button.active{
  background:var(--yellow);
  color:var(--black);
  border-color:var(--yellow);
}

/* TOPIC PILLS */
.topics{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.topic-pill{
  font-size:11px;
  padding:5px 10px;
  border-radius:20px;
  border:1.5px solid var(--grey2);
  background:var(--grey);
  color:var(--text-muted);
  font-weight:600;
}

.topic-pill.on{
  background:var(--yellow);
  color:var(--black);
  border-color:var(--yellow);
}

/* PROGRESS BAR */
.progress{
  height:5px;
  background:var(--grey2);
  border-radius:6px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:var(--yellow);
  transition:width .35s;
}

/* QUESTION CARD */
.q-card{
  width:100%;
  background:var(--grey);
  border-radius:16px;
  padding:22px 20px;
  border:1.5px solid var(--grey2);
  animation:fadeUp .2s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.q-meta{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--black);
  background:var(--yellow);
  padding:3px 10px;
  border-radius:20px;
  margin-bottom:12px;
}

.q-text{
  font-size:16px;
  line-height:1.55;
  margin-bottom:18px;
  color:var(--text-on-black);
  font-weight:500;
}

/* ANSWER OPTIONS */
.tf-row{display:flex;gap:10px;}

.options{display:flex;flex-direction:column;gap:8px;}

.opt{
  text-align:left;
  padding:12px 16px;
  border-radius:10px;
  border:1.5px solid var(--grey2);
  background:#252525;
  font-size:14px;
  color:var(--text-on-black);
  transition:all .15s;
  width:100%;
  font-weight:500;
}

.opt:hover:not(:disabled){
  border-color:var(--yellow);
  color:var(--yellow);
  background:#1E1E00;
}

.opt.correct{
  background:var(--correct-bg);
  border-color:var(--correct-border);
  color:var(--correct-text);
}

.opt.wrong{
  background:var(--wrong-bg);
  border-color:var(--wrong-border);
  color:var(--wrong-text);
}

/* EXPLANATION */
.explanation{
  margin-top:14px;
  font-size:13px;
  line-height:1.55;
  padding:12px 14px;
  background:#1A1A1A;
  border-left:3px solid var(--yellow);
  border-radius:0 8px 8px 0;
  color:#ccc;
}

/* NAV */
.nav{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:14px;
}

.nav-info{
  margin-left:auto;
  font-size:13px;
  color:var(--text-muted);
  font-weight:600;
}

/* DONE CARD */
.done-card{
  text-align:center;
  padding:50px 24px;
  background:var(--grey);
  border-radius:16px;
  border:1.5px solid var(--grey2);
  animation:fadeUp .3s ease;
}

.done-score{
  font-size:58px;
  font-weight:800;
  color:var(--yellow);
  margin-bottom:8px;
  line-height:1;
}

.done-msg{
  color:var(--text-muted);
  margin-bottom:24px;
  font-size:16px;
  font-weight:500;
}

/* MOBILE TWEAKS */
@media(max-width:480px){
  .site-header h1{font-size:18px;}
  #app{padding:12px 12px 0;}
  .q-text{font-size:15px;}
  .opt{font-size:13px;padding:11px 13px;}
  .done-score{font-size:48px;}
  .controls{gap:5px;}
  button{font-size:12px;padding:6px 11px;}
  .tf-row{gap:8px;}
  .tf-row .opt{flex:1;}
}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
</style>

<script>
const ALL_QUESTIONS = [
  {topic:"Research Methods",type:"tf",q:"Research is strictly for obtaining new knowledge.",a:false,exp:"Research can also confirm existing knowledge, build on prior work, or find real-world applications."},
  {topic:"Research Methods",type:"tf",q:"Quantitative methods rely primarily on objective data like quantification and statistical analysis.",a:true,exp:"Quantitative = objective, numerical, statistical."},
  {topic:"Research Methods",type:"tf",q:"Data can be collected from both passive AND active music therapy.",a:true,exp:"Both active (playing, singing) and receptive (listening) methods can yield research data."},

  {topic:"Research Methods",type:"mc",q:"What is EBP (Evidence Based Practice)?",opts:["Doctor reported, hospital-based scientific method","Patient reported, clinician observed, and research derived evidence","Literature review of quantitative data only","Clinical expertise alone"],a:1,exp:"EBP = research evidence + clinical expertise + patient preferences."},
  {topic:"Research Methods",type:"mc",q:"A typical quantitative study would LEAST likely include:",opts:["Surveys","Statistical analysis","Interviews or focus groups","Heart rate measurements"],a:2,exp:"Interviews and focus groups are qualitative methods, not quantitative."},

  {topic:"Research Methods",type:"tf",q:"Most MT research is basic research (seeking pure knowledge).",a:false,exp:"Most MT research is applied research — aimed at helping people directly."},
  {topic:"Research Methods",type:"mc",q:"What strengthens research validity?",opts:["Fewer participants","Larger sample sizes, control groups, standardized measures","Case studies only","Anecdotal evidence"],a:1,exp:"Validity is strengthened by larger samples, controls, and standardized measures."},
  {topic:"Research Methods",type:"mc",q:"What is a major barrier in MT research?",opts:["Lack of funding","Many variables involved — music, interventions, therapists, individual differences","No interest from universities","Ethical restrictions"],a:1,exp:"MT research involves many variables making it hard to isolate effects."},

  {topic:"NMT",type:"mc",q:"Scientific evidence in music neuroscience led to the development of:",opts:["Psychodynamic music therapy","Neurologic Music Therapy (NMT)","Community Music Therapy","Guided Imagery and Music"],a:1,exp:"NMT was developed from scientific evidence in music neuroscience."},
  {topic:"NMT",type:"mc",q:"NMT is most successful in reaching goals related to:",opts:["Memory","Emotion","Movement","Social skills"],a:2,exp:"NMT is especially effective for movement/gait rehabilitation."},
  {topic:"NMT",type:"tf",q:"The main purpose of NMT is rehabilitation through neuroplasticity.",a:true,exp:"NMT leverages neuroplasticity to rehabilitate functions, especially movement."},
  {topic:"NMT",type:"tf",q:"Melodic intonation therapy uses unimpaired singing ability to retrain speaking after neurological damage.",a:true,exp:"MIT uses singing to bypass speech deficits and retrain language pathways."},
  {topic:"NMT",type:"mc",q:"Aphasia is:",opts:["Loss of hearing","Loss of memory","Brain damage affecting production or comprehension of written and spoken words","Paralysis of the vocal cords"],a:2,exp:"Aphasia = brain damage affecting language production and/or comprehension."},
  {topic:"NMT",type:"tf",q:"Individuals with aphasia often struggle with speech but can frequently still sing fluently.",a:true,exp:"A key feature of aphasia — singing ability is often preserved even when speech is impaired."},
  {topic:"NMT",type:"mc",q:"What technique uses a metronome to help with movement and gait?",opts:["Melodic Intonation Therapy","Vocal Holding","Rhythmic Auditory Stimulation (RAS)","Guided Imagery"],a:2,exp:"RAS uses rhythmic cues (like a metronome) to help patients regulate movement and gait."},

  {topic:"Parkinson's Disease",type:"tf",q:"PD is mainly characterized by loss of motor function (walking, balance, coordination).",a:true,exp:"PD is a neurodegenerative disorder primarily affecting motor function."},
  {topic:"Parkinson's Disease",type:"mc",q:"Non-motor symptoms of PD include all EXCEPT:",opts:["Cognition changes","Depression","Anxiety","Tremors"],a:3,exp:"Tremors are a MOTOR symptom. Non-motor symptoms include cognition, depression, and anxiety."},

  {topic:"Parkinson's Disease",type:"mc",q:"What group activity do people with PD increasingly take part in?",opts:["Drumming circles","Choirs","Dance classes","Music listening groups"],a:1,exp:"Choirs are increasingly popular for people with PD due to voice and social benefits."},
  {topic:"Parkinson's Disease",type:"mc",q:"Although results were non-significant, PD participants said group MT experiences were:",opts:["Ineffective","Confusing","Positive","Too physically demanding"],a:2,exp:"Despite non-significant statistical results, participants reported positive subjective experiences."},

  {topic:"Dementia",type:"mc",q:"Which is true regarding dementia treatment with antipsychotics?",opts:["They cure cognitive decline","They manage symptoms but increase fall risk","They improve motor function","They have no side effects"],a:1,exp:"Antipsychotics can manage behavioural symptoms but increase fall risk in dementia patients."},

  {topic:"NICU",type:"mc",q:"In the Loewy et al (2013) study, results were most significantly improved for:",opts:["Heart rate and respiration","Oxygen saturation","Sleep and feeding","Pain reduction"],a:2,exp:"Loewy (2013) showed greatest improvements in sleep and feeding — different from the 'Vital Signs' study (HR/RR)."},

  {topic:"Therapy Models",type:"mc",q:"Guided Imagery and Music (GIM) is associated with which approach?",opts:["Neurologic Music Therapy","Community Music Therapy","Psychodynamic MT","Behavioural MT"],a:2,exp:"GIM is a psychodynamic approach to music therapy."},
  {topic:"Therapy Models",type:"mc",q:"Diane Austin used vocal holding and free association to work with:",opts:["Children with ASD","NICU premature infants","Adults who have experienced trauma","Parkinson's patients"],a:2,exp:"Diane Austin specialized in using voice with adults who experienced trauma."},
  {topic:"Therapy Models",type:"mc",q:"Community Music Therapy focuses on:",opts:["Individual rehabilitation","Neurological techniques","Relationships, inclusion, and shared meaning","Psychodynamic processes"],a:2,exp:"Community MT = relationships, inclusion, shared meaning (e.g., autism choir, intergenerational groups, refugee women)."},
  {topic:"Therapy Models",type:"mc",q:"Which intervention offers a less-threatening alternative to talk therapy?",opts:["Rhythmic Auditory Stimulation","Melodic Intonation Therapy","Lyric analysis","Guided Imagery"],a:2,exp:"Lyric analysis lets clients discuss emotions and experiences through song lyrics rather than direct conversation."},

  {topic:"Mental Health",type:"mc",q:"The Finnerty & Trainor (2023) study focused on what population?",opts:["Hospitalized adults","Individuals with dementia","Undergraduate students","Refugee women"],a:2,exp:"Finnerty & Trainor (2023) studied stress/anxiety in undergraduate students."},
  {topic:"Mental Health",type:"mc",q:"The focus of the Karen Agro guest lecture study was:",opts:["Trauma-informed care","Stress and anxiety reduction — proactive wellness","Group psychotherapy","Crisis intervention"],a:1,exp:"The study focused on proactive, preventative wellness — not crisis care."},
  {topic:"Mental Health",type:"mc",q:"'Proactive' wellness means:",opts:["Reacting to crises","Prevention, not crisis care","Individual counselling only","Using medication first"],a:1,exp:"Proactive = prevention-focused, helping people before they reach crisis."},

  {topic:"Misc / Other",type:"tf",q:"Just one session of receptive MT improved anxiety and vitals in COVID-19 patients.",a:true,exp:"Even a single session of receptive MT showed improvements in anxiety and vital signs."},
  {topic:"Misc / Other",type:"mc",q:"Cultural factors impacting help-seeking in the Mexican Migrant Farmworkers study were:",opts:["Collectivism, individualism, fatalism","Familismo, personalismo, machismo","Spirituality, family, respect","Loyalty, trust, silence"],a:1,exp:"The three key cultural factors identified were familismo, personalismo, and machismo."},
  {topic:"Misc / Other",type:"mc",q:"In the intergenerational group, elders and youth did all activities EXCEPT:",opts:["Playing instruments","Singing familiar songs","Creating and recording a CD","Movement activities"],a:2,exp:"They did NOT create/record a CD — this is a common tricky question."},
  {topic:"Misc / Other",type:"tf",q:"The most common MT intervention as per readings is listening through headphones.",a:false,exp:"Listening through headphones is NOT the most common MT intervention."},
  {topic:"Misc / Other",type:"mc",q:"What is music therapy?",opts:["Playing music for patients","The use of music within a therapeutic relationship to achieve individualized goals","Any music used in a healthcare setting","Music medicine delivered by any clinician"],a:1,exp:"MT must be within a therapeutic relationship, by a credentialed MTA, with individualized goals."},
];

const TOPICS = [...new Set(ALL_QUESTIONS.map(q => q.topic))];

let state = {
  topicsOn: new Set(TOPICS),
  typeFilter: 'all',
  missedOnly: false,
  shuffled: false,
  deck: [],
  current: 0,
  answered: null,
  score: 0,
  total: 0,
  missed: new Set(),
  done: false
};

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function buildDeck(){
  let qs = ALL_QUESTIONS.filter(q => state.topicsOn.has(q.topic));
  if(state.typeFilter==='tf') qs = qs.filter(q=>q.type==='tf');
  if(state.typeFilter==='mc') qs = qs.filter(q=>q.type==='mc');
  if(state.missedOnly) qs = qs.filter(q=>state.missed.has(ALL_QUESTIONS.indexOf(q)));
  if(state.shuffled) shuffleArray(qs);
  state.deck = qs;
  state.current = 0;
  state.answered = null;
  state.score = 0;
  state.total = 0;
  state.done = false;
}

function confetti(){
  for(let i=0;i<80;i++){
    const c=document.createElement("div");
    c.style.cssText=`position:fixed;width:9px;height:9px;left:${Math.random()*100}vw;top:-10px;z-index:9999;border-radius:2px;transition:transform 1.6s linear,opacity 1.6s;`;
    c.style.background=['#FFD600','#ffffff','#111111','#FFEC66','#FFA500'][Math.floor(Math.random()*5)];
    document.body.appendChild(c);
    setTimeout(()=>{c.style.transform=`translateY(105vh) rotate(${Math.random()*360}deg)`;c.style.opacity=0;},10);
    setTimeout(()=>c.remove(),1700);
  }
}

function applyAnswerStyles(){
  const q=state.deck[state.current];
  if(state.answered===null) return;
  const btns=document.querySelectorAll('.opt');
  if(q.type==='tf'){
    btns.forEach(b=>{
      const val = b.dataset.val==='true';
      if(val===q.a){b.classList.add('correct');}
      else if(val===state.answered){b.classList.add('wrong');}
    });
  } else {
    btns.forEach((b,i)=>{
      if(i===q.a){b.classList.add('correct');}
      else if(i===state.answered){b.classList.add('wrong');}
    });
  }
}

function render(){
  const app=document.getElementById('app');
  const q=state.deck[state.current];
  const pct=state.deck.length ? Math.round(((state.current)/state.deck.length)*100) : 0;

  let html=`<div class="header">
    <div class="score-bar">
      <div class="stat">⭐ ${state.score}/${state.total}</div>
      <div class="stat">📚 ${state.deck.length} questions</div>
    </div>
    <div class="controls">
      <button onclick="setType('all')" class="${state.typeFilter==='all'?'active':''}">All</button>
      <button onclick="setType('tf')" class="${state.typeFilter==='tf'?'active':''}">T/F</button>
      <button onclick="setType('mc')" class="${state.typeFilter==='mc'?'active':''}">MC</button>
      <button onclick="toggleShuffle()" class="${state.shuffled?'active':''}">🔀 Shuffle</button>
      <button onclick="toggleMissed()" class="${state.missedOnly?'active':''}">❌ Missed${state.missed.size?` (${state.missed.size})`:''}</button>
      <button onclick="resetQuiz()">↺ Reset</button>
    </div>
    <div class="topics">
      ${TOPICS.map(t=>`<button class="topic-pill ${state.topicsOn.has(t)?'on':''}" onclick="toggleTopic('${t}')">${t}</button>`).join('')}
    </div>
    <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;

  if(state.done||!q){
    const pct2=state.total>0?Math.round((state.score/state.total)*100):0;
    html+=`<div class="done-card">
      <div class="done-score">${state.score}/${state.total}</div>
      <div class="done-msg">${pct2>=80?'🎉 Crushed it!':pct2>=60?'👍 Nice work!':'📖 Keep studying!'} (${pct2}%)</div>
      <button onclick="resetQuiz()">↺ Restart</button>
    </div>`;
    app.innerHTML=html;
    return;
  }

  const answered=state.answered!==null;

  html+=`<div class="q-card">
    <div class="q-meta">${q.topic} · ${q.type==='tf'?'True / False':'Multiple Choice'}</div>
    <div class="q-text">${q.q}</div>`;

  if(q.type==='tf'){
    html+=`<div class="tf-row">
      <button class="opt" data-val="true" onclick="answer(true)" ${answered?'disabled':''}>✅ True</button>
      <button class="opt" data-val="false" onclick="answer(false)" ${answered?'disabled':''}>❌ False</button>
    </div>`;
  } else {
    html+=`<div class="options">`;
    q.opts.forEach((o,i)=>{
      html+=`<button class="opt" onclick="answer(${i})" ${answered?'disabled':''}>${o}</button>`;
    });
    html+=`</div>`;
  }

  if(answered){
    html+=`<div class="explanation">💡 ${q.exp}</div>`;
  }

  html+=`</div>
  <div class="nav">
    ${answered?`<button onclick="next()">Next →</button>`:''}
    <span class="nav-info">${state.current+1} / ${state.deck.length}</span>
  </div>`;

  app.innerHTML=html;
  if(answered) applyAnswerStyles();
}

function answer(val){
  if(state.answered!==null) return;
  const q=state.deck[state.current];
  const idx=ALL_QUESTIONS.indexOf(q);
  state.answered=val;
  state.total++;
  const correct=val===q.a;
  if(correct) state.score++;
  else state.missed.add(idx);
  render();
}

function next(){
  if(state.current<state.deck.length-1){
    state.current++;
    state.answered=null;
  } else {
    state.done=true;
    confetti();
  }
  render();
}

function setType(t){state.typeFilter=t;buildDeck();render();}
function toggleShuffle(){state.shuffled=!state.shuffled;buildDeck();render();}
function toggleMissed(){state.missedOnly=!state.missedOnly;buildDeck();render();}
function resetQuiz(){state={...state,score:0,total:0,missed:new Set(),done:false};buildDeck();render();}
function toggleTopic(t){
  if(state.topicsOn.has(t)&&state.topicsOn.size>1) state.topicsOn.delete(t);
  else state.topicsOn.add(t);
  buildDeck();render();
}

buildDeck();
render();
</script>
</body>
</html>
