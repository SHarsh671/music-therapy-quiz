<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1rem 0; }
.header { margin-bottom: 1rem; }
.score-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; color: var(--color-text-secondary); }
.stat span { font-weight: 500; color: var(--color-text-primary); }
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
button { cursor: pointer; font-family: var(--font-sans); font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); transition: background 0.15s; }
button:hover { background: var(--color-background-secondary); }
button.active { background: var(--color-background-secondary); border-color: var(--color-border-primary); font-weight: 500; }
.topics { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.topic-pill { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
.topic-pill.on { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
.progress { height: 3px; background: var(--color-border-tertiary); border-radius: 2px; margin-bottom: 1.5rem; }
.progress-fill { height: 100%; background: var(--color-text-secondary); border-radius: 2px; transition: width 0.3s; }
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.q-meta { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; }
.q-text { font-size: 15px; line-height: 1.6; color: var(--color-text-primary); margin-bottom: 1rem; }
.options { display: flex; flex-direction: column; gap: 8px; }
.opt { text-align: left; padding: 10px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); font-size: 14px; color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; }
.opt:hover { border-color: var(--color-border-secondary); }
.opt.correct { background: #eaf3de; border-color: #639922; color: #3B6D11; }
.opt.wrong { background: #fcebeb; border-color: #a32d2d; color: #a32d2d; }
.opt.reveal { background: #eaf3de; border-color: #639922; color: #3B6D11; }
.opt:disabled { cursor: default; }
.tf-row { display: flex; gap: 8px; }
.tf-row .opt { flex: 1; text-align: center; }
.explanation { margin-top: 10px; font-size: 13px; color: var(--color-text-secondary); padding: 10px 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); line-height: 1.5; }
.nav { display: flex; gap: 8px; margin-top: 1rem; align-items: center; }
.nav-info { font-size: 13px; color: var(--color-text-tertiary); margin-left: auto; }
.done-card { text-align: center; padding: 2rem; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); }
.done-score { font-size: 36px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.done-msg { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
</style>

<h2 class="sr-only">Music therapy 2MU3 exam quiz — 90 questions with topic filters, scoring, and missed-questions mode</h2>
<div id="app"></div>

<script>
const ALL_QUESTIONS = [
  {topic:"Research Methods",type:"tf",q:"Research is strictly for obtaining new knowledge.",a:false,exp:"Research can also confirm existing knowledge, build on prior work, or find real-world applications."},
  {topic:"Research Methods",type:"tf",q:"Quantitative methods rely primarily on objective data like quantification and statistical analysis.",a:true,exp:"Quantitative = objective, numerical, statistical."},
  {topic:"Research Methods",type:"tf",q:"Data can be collected from both passive AND active music therapy.",a:true,exp:"Both active (playing, singing) and receptive (listening) methods can yield research data."},
  {topic:"Research Methods",type:"tf",q:"Case studies allow researchers to make general conclusions about the population with high accuracy.",a:false,exp:"Case studies cannot be generalized broadly — they are specific and exploratory."},
  {topic:"Research Methods",type:"mc",q:"What is EBP (Evidence Based Practice)?",opts:["Doctor reported, hospital-based scientific method","Patient reported, clinician observed, and research derived evidence","Literature review of quantitative data only","Clinical expertise alone"],a:1,exp:"EBP = research evidence + clinical expertise + patient preferences."},
  {topic:"Research Methods",type:"mc",q:"A typical quantitative study would LEAST likely include:",opts:["Surveys","Statistical analysis","Interviews or focus groups","Heart rate measurements"],a:2,exp:"Interviews and focus groups are qualitative methods, not quantitative."},
  {topic:"Research Methods",type:"mc",q:"What kind of data was collected in the intergenerational dementia/youth group study?",opts:["Quantitative (HR, cortisol)","Qualitative (observations and conversations)","Mixed methods","Survey-based"],a:1,exp:"The intergenerational study used qualitative data — observations and conversations."},
  {topic:"Research Methods",type:"tf",q:"In the ABI songwriting case study, data was objective rather than subjective.",a:false,exp:"The ABI songwriting case study used subjective data."},
  {topic:"Research Methods",type:"mc",q:"Which is often considered a limitation of pilot studies in MT research?",opts:["Too many variables","Small number of participants","Lack of control groups","Long duration"],a:1,exp:"Small sample size is the most common limitation of pilot studies."},
  {topic:"Research Methods",type:"tf",q:"Most MT research is basic research (seeking pure knowledge).",a:false,exp:"Most MT research is applied research — aimed at helping people directly."},
  {topic:"Research Methods",type:"mc",q:"What strengthens research validity?",opts:["Fewer participants","Larger sample sizes, control groups, standardized measures","Case studies only","Anecdotal evidence"],a:1,exp:"Validity is strengthened by larger samples, controls, and standardized measures."},
  {topic:"Research Methods",type:"mc",q:"What is a major barrier in MT research?",opts:["Lack of funding","Many variables involved — music, interventions, therapists, individual differences","No interest from universities","Ethical restrictions"],a:1,exp:"MT research involves many variables making it hard to isolate effects."},

  {topic:"NMT",type:"mc",q:"Scientific evidence in music neuroscience led to the development of:",opts:["Psychodynamic music therapy","Neurologic Music Therapy (NMT)","Community Music Therapy","Guided Imagery and Music"],a:1,exp:"NMT was developed from scientific evidence in music neuroscience."},
  {topic:"NMT",type:"mc",q:"NMT is most successful in reaching goals related to:",opts:["Memory","Emotion","Movement","Social skills"],a:2,exp:"NMT is especially effective for movement/gait rehabilitation."},
  {topic:"NMT",type:"tf",q:"The main purpose of NMT is rehabilitation through neuroplasticity.",a:true,exp:"NMT leverages neuroplasticity to rehabilitate functions, especially movement."},
  {topic:"NMT",type:"tf",q:"Melodic intonation therapy uses unimpaired singing ability to retrain speaking after neurological damage.",a:true,exp:"MIT uses singing to bypass speech deficits and retrain language pathways."},
  {topic:"NMT",type:"mc",q:"Aphasia is:",opts:["Loss of hearing","Loss of memory","Brain damage affecting production or comprehension of written and spoken words","Paralysis of the vocal cords"],a:2,exp:"Aphasia = brain damage affecting language production and/or comprehension."},
  {topic:"NMT",type:"tf",q:"Individuals with aphasia often struggle with speech but can frequently still sing fluently.",a:true,exp:"A key feature of aphasia — singing ability is often preserved even when speech is impaired."},
  {topic:"NMT",type:"mc",q:"What technique uses a metronome to help with movement and gait?",opts:["Melodic Intonation Therapy","Vocal Holding","Rhythmic Auditory Stimulation (RAS)","Guided Imagery"],a:2,exp:"RAS uses rhythmic cues (like a metronome) to help patients regulate movement and gait."},

  {topic:"Parkinson's Disease",type:"tf",q:"PD is mainly characterized by loss of motor function (walking, balance, coordination).",a:true,exp:"PD is a neurodegenerative disorder primarily affecting motor function."},
  {topic:"Parkinson's Disease",type:"mc",q:"Non-motor symptoms of PD include all EXCEPT:",opts:["Cognition changes","Depression","Anxiety","Tremors"],a:3,exp:"Tremors are a MOTOR symptom. Non-motor symptoms include cognition, depression, and anxiety."},
  {topic:"Parkinson's Disease",type:"tf",q:"Speech therapy is the most effective treatment for speech impairments from PD.",a:false,exp:"MT/music-based approaches are considered more effective than speech therapy alone for PD speech."},
  {topic:"Parkinson's Disease",type:"mc",q:"The Lee Silverman Voice Technique mainly involves:",opts:["Singing exercises","Playing wind instruments","Practicing speaking or reading","Using a metronome"],a:2,exp:"Lee Silverman Voice Technique = practicing speaking or reading to strengthen voice."},
  {topic:"Parkinson's Disease",type:"mc",q:"What group activity do people with PD increasingly take part in?",opts:["Drumming circles","Choirs","Dance classes","Music listening groups"],a:1,exp:"Choirs are increasingly popular for people with PD due to voice and social benefits."},
  {topic:"Parkinson's Disease",type:"mc",q:"Although results were non-significant, PD participants said group MT experiences were:",opts:["Ineffective","Confusing","Positive","Too physically demanding"],a:2,exp:"Despite non-significant statistical results, participants reported positive subjective experiences."},

  {topic:"Dementia",type:"mc",q:"Which is true regarding dementia treatment with antipsychotics?",opts:["They cure cognitive decline","They manage symptoms but increase fall risk","They improve motor function","They have no side effects"],a:1,exp:"Antipsychotics can manage behavioural symptoms but increase fall risk in dementia patients."},
  {topic:"Dementia",type:"tf",q:"MT for persons with dementia has shown to temporarily improve cognitive functioning.",a:true,exp:"MT temporarily improves memory and orientation, though effects fade within a week."},
  {topic:"Dementia",type:"tf",q:"Sundowning = increased agitation in the afternoon/evening for dementia patients.",a:true,exp:"Sundowning is a recognized pattern of increased confusion/agitation in later hours."},
  {topic:"Dementia",type:"mc",q:"In the 'Temporal Limits' dementia study, the MT group was compared to:",opts:["A no-treatment control","Group receiving medication","Group watching a preferred movie","Group doing art therapy"],a:2,exp:"The control group watched a preferred movie — an active control comparison."},
  {topic:"Dementia",type:"mc",q:"In 'Temporal Limits,' which interventions were reported as most impactful?",opts:["Hello song and familiar songs","Playing instruments and laughter","Movement and playing instruments","Hello song and laughter"],a:2,exp:"Movement and playing instruments were identified as most impactful interventions."},
  {topic:"Dementia",type:"mc",q:"The 'Temporal Limits' study used what research design?",opts:["Case study","Randomized Controlled Trial","Pilot study","Longitudinal study"],a:1,exp:"The Temporal Limits study used a Randomized Controlled Trial (RCT) design."},
  {topic:"Dementia",type:"tf",q:"In 'Temporal Limits,' MMSE scores were significantly different immediately after MT vs. the control.",a:false,exp:"The difference showed up the NEXT MORNING, not immediately after the session."},
  {topic:"Dementia",type:"mc",q:"The intergenerational group was unique because it included:",opts:["Toddlers and babies with adults with dementia","Adolescents in psychiatric care joining adults with dementia","Seniors joining children with ASD","University students joining dementia patients"],a:1,exp:"Uniquely, it was psychiatric teens — not the usual toddlers/babies — joining adults with dementia."},

  {topic:"NICU",type:"tf",q:"Average NICU sound levels of 70–80 dB are safe for infants.",a:false,exp:"70–80 dB is too loud and unsafe for premature infants in the NICU."},
  {topic:"NICU",type:"tf",q:"Loewy et al (2013) used lullabies, ocean disc, and gato box as the three live interventions.",a:true,exp:"Those were the three specific interventions used in the Loewy study."},
  {topic:"NICU",type:"tf",q:"Loewy (2013) was the first study to use live womb sounds created by a music therapist AND include parental involvement.",a:true,exp:"This was groundbreaking — first to combine live womb sounds with parental involvement."},
  {topic:"NICU",type:"mc",q:"What research design did Loewy et al (2013) use?",opts:["Randomized Controlled Trial","Longitudinal case study","Randomized crossover","Pilot study"],a:2,exp:"Loewy et al used a randomized crossover design."},
  {topic:"NICU",type:"mc",q:"Maitre & Arnon (2020) identified which challenge for NICU MT research?",opts:["Too many participants","Risk of imprecise measures since most brain research comes from adults","Lack of parental consent","Ethical issues with live music"],a:1,exp:"Most neuroscience data comes from adults, making it hard to precisely measure infant brain responses."},
  {topic:"NICU",type:"mc",q:"What is the main purpose of the Pacifier Activated Lullaby?",opts:["Soothe the infant to sleep","Help the infant practice the sucking mechanism for feeding","Stimulate cognitive development","Reduce NICU noise levels"],a:1,exp:"The PAL helps infants practice and strengthen sucking, supporting feeding development."},
  {topic:"NICU",type:"mc",q:"Music therapy in the NICU appears to improve infants':",opts:["Visual acuity","Social responsiveness","Oxygen saturation","Motor development"],a:2,exp:"MT has been shown to improve oxygen saturation in NICU infants."},
  {topic:"NICU",type:"tf",q:"Music therapy does NOT lead to overstimulation in the NICU.",a:true,exp:"When properly administered, MT does not overstimulate NICU infants."},
  {topic:"NICU",type:"mc",q:"MT NICU training for music therapists is typically how long?",opts:["6 months","1 year","2 weeks","1 month"],a:2,exp:"NICU-specific MT training is typically only 2 weeks."},
  {topic:"NICU",type:"mc",q:"In 'Effects of MT on Vital Signs, Feeding and Sleep in Premature Infants,' results were significant for:",opts:["Sleep and feeding","Heart rate (HR) and respiration rate (RR)","Oxygen saturation and weight gain","Pain and anxiety"],a:1,exp:"This study's significant results were for HR and RR. Loewy's significant results were sleep and feeding — don't mix them up!"},
  {topic:"NICU",type:"mc",q:"In the Loewy et al (2013) study, results were most significantly improved for:",opts:["Heart rate and respiration","Oxygen saturation","Sleep and feeding","Pain reduction"],a:2,exp:"Loewy (2013) showed greatest improvements in sleep and feeding — different from the 'Vital Signs' study (HR/RR)."},

  {topic:"Pediatrics",type:"tf",q:"Active types of MT are often MORE feasible in hospital pediatric settings.",a:false,exp:"Receptive (listening) MT is more feasible in hospital settings — active requires more physical engagement."},
  {topic:"Pediatrics",type:"mc",q:"How were CDs made in the pediatric radiation therapy study?",opts:["Pre-recorded by the MT","Made by the patient with assistance of the MT","Purchased from a music store","Chosen from a library"],a:1,exp:"Patient-created CDs — made with MT assistance — were central to the intervention."},
  {topic:"Pediatrics",type:"mc",q:"Data in the pediatric radiation therapy CD study was collected from:",opts:["Children only","Parents only","Parents and staff","Children, parents, AND staff"],a:3,exp:"All three groups provided data — children, parents, and staff."},
  {topic:"Pediatrics",type:"mc",q:"What type of data was collected in the pediatric CD study?",opts:["Quantitative only","Qualitative only","Both qualitative and quantitative","Observational only"],a:2,exp:"It was a mixed methods study — both qualitative and quantitative data collected."},
  {topic:"Pediatrics",type:"tf",q:"The CD was only used during radiation therapy treatments.",a:false,exp:"CDs were also used in the car, at home, and at school — extending beyond treatment sessions."},
  {topic:"Pediatrics",type:"tf",q:"The literature review on MT for children with cancer only included individual MT sessions.",a:false,exp:"The literature review included both individual and group MT sessions."},
  {topic:"Pediatrics",type:"mc",q:"The MT CD gave children a sense of:",opts:["Competition and achievement","Choice, mastery, and control","Social belonging","Independence from parents"],a:1,exp:"Key outcomes were coping, control, mastery, autonomy, and reduced anxiety."},

  {topic:"Autism",type:"tf",q:"Due to ASD disabilities, music is often difficult for individuals with ASD to process.",a:false,exp:"Individuals with ASD often have strengths in music — not difficulties."},
  {topic:"Autism",type:"mc",q:"The neuroscience research on autism demonstrated that 1:1 MT:",opts:["Had no measurable brain effects","Changed brain connectivity, reduced maladaptive behaviours, and enhanced family-reported QoL","Only improved social skills","Primarily helped with motor development"],a:1,exp:"1:1 MT showed neurological changes + behavioural and quality of life improvements."},
  {topic:"Autism",type:"mc",q:"Which provides greater inclusion for autistic people in society?",opts:["Individual therapy sessions","Mainstream concerts","Sensory Friendly Concerts","Online music programs"],a:2,exp:"Sensory Friendly Concerts are designed to be inclusive and accessible for autistic individuals."},
  {topic:"Autism",type:"mc",q:"The Autistic Adults Singing Group used what model?",opts:["Medical model / NMT","Social model / Community Music Therapy","Psychodynamic model","Behavioural model"],a:1,exp:"It used the social model and Community Music Therapy approach."},
  {topic:"Autism",type:"mc",q:"QoL measures used in the Autistic Adults Singing Group were:",opts:["Pain, anxiety, depression","Happiness, productivity, relationships","Belonging, Being, Becoming","Memory, orientation, social skills"],a:2,exp:"Belonging, Being, Becoming were the three QoL dimensions measured."},

  {topic:"Depression",type:"tf",q:"In 'Active vs Receptive Group MT for MDD,' there was an equal number of drop-outs in all groups.",a:false,exp:"Drop-out rates were NOT equal across the active, receptive, and control groups."},
  {topic:"Depression",type:"mc",q:"Which acted as the control group in the 'Active vs Receptive Group MT for MDD' study?",opts:["No treatment","Individual counselling","Group counselling","Medication only"],a:2,exp:"Group counselling served as the active control group in this study."},
  {topic:"Depression",type:"mc",q:"Receptive interventions in the MDD study included:",opts:["Drumming and improvisation","Music listening and Guided Imagery only","Lyric analysis and songwriting","Group singing and movement"],a:1,exp:"Receptive group = music listening + Guided Imagery only."},

  {topic:"Palliative Care",type:"tf",q:"Significant improvement was found in pain, anxiety, depression, and shortness of breath in the palliative MT outcomes study.",a:true,exp:"Gallagher et al (2018) found significant improvements across these domains with ~96% positive response rate."},
  {topic:"Palliative Care",type:"mc",q:"The Japan hospice study (Nakayama et al, 2009) collected quantitative data using:",opts:["Heart rate and blood pressure","5 Mood Inventory and S-Cortisol levels","MMSE and pain scale","Interviews and observations"],a:1,exp:"Two quantitative measures: 5 Mood Inventory + Salivary Cortisol (S-Cortisol)."},
  {topic:"Palliative Care",type:"tf",q:"The Japan hospice study suggests MT is NOT effective for anxiety/stress in palliative care.",a:false,exp:"The study suggests MT IS effective — it showed decreased anxiety/depression and increased refreshment."},
  {topic:"Palliative Care",type:"tf",q:"In the Japan hospice study, s-cortisol decreased in all 10 patients after MT.",a:false,exp:"S-cortisol decreased in only 6 out of 10 patients — NOT all of them."},
  {topic:"Palliative Care",type:"mc",q:"In the Japan hospice 5 Mood Inventory, which parameter showed NO significant change?",opts:["Depression","Anxiety","Refreshment","Fatigue"],a:3,exp:"Fatigue showed NO significant change. Refreshment showed significant increase."},
  {topic:"Palliative Care",type:"mc",q:"Which parameter showed a significant INCREASE in the Japan hospice 5 Mood Inventory?",opts:["Energy","Refreshment","Clarity","Calmness"],a:1,exp:"Refreshment showed a significant increase. Depression/anxiety showed decreasing tendency."},
  {topic:"Palliative Care",type:"mc",q:"In Palliative Care Paper 1 (Gallagher), MT-reported behavioural changes were observed in:",opts:["Speech and cognition","Heart rate and respiration","Facial expression, body movement, and vocalization","Sleep and appetite"],a:2,exp:"Observable behavioural changes = facial expression, body movement, and vocalization."},
  {topic:"Palliative Care",type:"mc",q:"What percentage of palliative patients had a positive response to MT (Gallagher)?",opts:["75%","88%","96%","100%"],a:2,exp:"Approximately 96% of palliative patients had a positive response to MT."},
  {topic:"Palliative Care",type:"mc",q:"Catharsis means:",opts:["Creating music spontaneously","The process of releasing or relieving strong or repressed emotions","A type of receptive MT","Analysing song lyrics for meaning"],a:1,exp:"Catharsis = releasing/relieving strong or repressed emotions through the therapeutic experience."},
  {topic:"Palliative Care",type:"mc",q:"What is the most common symptom MT addresses in palliative care?",opts:["Anxiety","Nausea","Pain","Depression"],a:2,exp:"Pain is the most common symptom addressed by MT in palliative care settings."},

  {topic:"Disability",type:"tf",q:"MT can benefit from disability scholars and activists (Dis/Abling Musicking).",a:true,exp:"Disability scholarship challenges MT to think beyond individual deficits."},
  {topic:"Disability",type:"mc",q:"Disability activists would argue MT is:",opts:["Too group-focused","Too evidence-based","Too individual-based, not enough focus on environmental/cultural barriers","Too expensive to access"],a:2,exp:"Disability activists prefer the social model and argue MT over-focuses on the individual."},
  {topic:"Disability",type:"mc",q:"Neurodiversity is beneficial for:",opts:["Standardizing treatment","Eliminating differences","Embracing differences","Creating diagnoses"],a:2,exp:"Neurodiversity = embracing and valuing neurological differences rather than pathologizing them."},
  {topic:"Disability",type:"mc",q:"'Disabling Society' refers to:",opts:["The impact of disease on society","Working to prevent society from being ableist","Removing music from therapy","Labelling people as disabled"],a:1,exp:"'Disabling Society' = working to dismantle societal ableism and barriers."},
  {topic:"Disability",type:"mc",q:"Disability activists prefer which model?",opts:["Medical model","Psychodynamic model","Social model","Biomedical model"],a:2,exp:"The social model focuses on environmental and cultural barriers rather than individual deficits."},

  {topic:"Therapy Models",type:"mc",q:"Psychodynamic MT focuses on:",opts:["Gait and movement rehabilitation","Emotional expression and unconscious processes","Social inclusion and community","Evidence-based techniques"],a:1,exp:"Psychodynamic MT = emotional expression, unconscious processes; therapist creates a 'container.'"},
  {topic:"Therapy Models",type:"mc",q:"Guided Imagery and Music (GIM) is associated with which approach?",opts:["Neurologic Music Therapy","Community Music Therapy","Psychodynamic MT","Behavioural MT"],a:2,exp:"GIM is a psychodynamic approach to music therapy."},
  {topic:"Therapy Models",type:"mc",q:"Diane Austin used vocal holding and free association to work with:",opts:["Children with ASD","NICU premature infants","Adults who have experienced trauma","Parkinson's patients"],a:2,exp:"Diane Austin specialized in using voice with adults who experienced trauma."},
  {topic:"Therapy Models",type:"mc",q:"Community Music Therapy focuses on:",opts:["Individual rehabilitation","Neurological techniques","Relationships, inclusion, and shared meaning","Psychodynamic processes"],a:2,exp:"Community MT = relationships, inclusion, shared meaning (e.g., autism choir, intergenerational groups, refugee women)."},
  {topic:"Therapy Models",type:"mc",q:"Which intervention offers a less-threatening alternative to talk therapy?",opts:["Rhythmic Auditory Stimulation","Melodic Intonation Therapy","Lyric analysis","Guided Imagery"],a:2,exp:"Lyric analysis lets clients discuss emotions and experiences through song lyrics rather than direct conversation."},

  {topic:"Mental Health",type:"mc",q:"The Finnerty & Trainor (2023) study focused on what population?",opts:["Hospitalized adults","Individuals with dementia","Undergraduate students","Refugee women"],a:2,exp:"Finnerty & Trainor (2023) studied stress/anxiety in undergraduate students."},
  {topic:"Mental Health",type:"mc",q:"The focus of the Karen Agro guest lecture study was:",opts:["Trauma-informed care","Stress and anxiety reduction — proactive wellness","Group psychotherapy","Crisis intervention"],a:1,exp:"The study focused on proactive, preventative wellness — not crisis care."},
  {topic:"Mental Health",type:"mc",q:"'Proactive' wellness means:",opts:["Reacting to crises","Prevention, not crisis care","Individual counselling only","Using medication first"],a:1,exp:"Proactive = prevention-focused, helping people before they reach crisis."},

  {topic:"Misc / Other",type:"tf",q:"Just one session of receptive MT improved anxiety and vitals in COVID-19 patients.",a:true,exp:"Even a single session of receptive MT showed improvements in anxiety and vital signs."},
  {topic:"Misc / Other",type:"mc",q:"Cultural factors impacting help-seeking in the Mexican Migrant Farmworkers study were:",opts:["Collectivism, individualism, fatalism","Familismo, personalismo, machismo","Spirituality, family, respect","Loyalty, trust, silence"],a:1,exp:"The three key cultural factors identified were familismo, personalismo, and machismo."},
  {topic:"Misc / Other",type:"mc",q:"In the intergenerational group, elders and youth did all activities EXCEPT:",opts:["Playing instruments","Singing familiar songs","Creating and recording a CD","Movement activities"],a:2,exp:"They did NOT create/record a CD — this is a common tricky question."},
  {topic:"Misc / Other",type:"tf",q:"The most common MT intervention as per readings is listening through headphones.",a:false,exp:"Listening through headphones is NOT the most common MT intervention."},
  {topic:"Misc / Other",type:"mc",q:"What is music therapy?",opts:["Playing music for patients","The use of music within a therapeutic relationship to achieve individualized goals","Any music used in a healthcare setting","Music medicine delivered by any clinician"],a:1,exp:"MT must be within a therapeutic relationship, by a credentialed MTA, with individualized goals."},
];

const TOPICS = [...new Set(ALL_QUESTIONS.map(q => q.topic))];

let state = {
  topicsOn: new Set(TOPICS),
  typeFilter: 'all',
  missedOnly: false,
  shuffled: false,
  deck: [],
  current: 0,
  answered: null,
  score: 0,
  total: 0,
  missed: new Set(),
  done: false
};

function buildDeck() {
  let qs = ALL_QUESTIONS.filter(q => state.topicsOn.has(q.topic));
  if (state.typeFilter === 'tf') qs = qs.filter(q => q.type === 'tf');
  if (state.typeFilter === 'mc') qs = qs.filter(q => q.type === 'mc');
  if (state.missedOnly) qs = qs.filter((q, i) => state.missed.has(ALL_QUESTIONS.indexOf(q)));
  if (state.shuffled) qs = [...qs].sort(() => Math.random() - 0.5);
  state.deck = qs;
  state.current = 0;
  state.answered = null;
  state.score = 0;
  state.total = 0;
  state.done = false;
}

function render() {
  const app = document.getElementById('app');
  const q = state.deck[state.current];
  const pct = state.deck.length ? Math.round((state.current / state.deck.length) * 100) : 0;

  let html = `
    <div class="header">
      <div class="score-bar">
        <div class="stat">Score: <span>${state.score}/${state.total}</span></div>
        <div class="stat">Questions: <span>${state.deck.length}</span></div>
        ${state.missedOnly ? '<div class="stat" style="color:var(--color-text-danger)">Missed only</div>' : ''}
      </div>
      <div class="controls">
        <button class="${state.typeFilter==='all'?'active':''}" onclick="setType('all')">All</button>
        <button class="${state.typeFilter==='tf'?'active':''}" onclick="setType('tf')">True / False</button>
        <button class="${state.typeFilter==='mc'?'active':''}" onclick="setType('mc')">Multiple Choice</button>
        <button onclick="toggleShuffle()" class="${state.shuffled?'active':''}">Shuffle</button>
        <button onclick="toggleMissed()" class="${state.missedOnly?'active':''}">Missed only ${state.missed.size>0?'('+state.missed.size+')':''}</button>
        <button onclick="resetQuiz()">Reset</button>
      </div>
      <div class="topics">
        ${TOPICS.map(t => `<button class="topic-pill ${state.topicsOn.has(t)?'on':''}" onclick="toggleTopic('${t}')">${t}</button>`).join('')}
      </div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;

  if (state.done || state.deck.length === 0) {
    const pct2 = state.total > 0 ? Math.round((state.score / state.total) * 100) : 0;
    const msg = pct2 >= 85 ? "You're ready. Go crush it!" : pct2 >= 70 ? "Solid — review your missed ones!" : "Keep drilling — you got this!";
    html += `<div class="done-card">
      <div class="done-score">${state.score}/${state.total} (${pct2}%)</div>
      <div class="done-msg">${state.deck.length === 0 ? 'No questions match your filters.' : msg}</div>
      <button onclick="resetQuiz()">Start over</button>
      ${state.missed.size > 0 ? `<button onclick="drillMissed()" style="margin-left:8px">Drill missed (${state.missed.size})</button>` : ''}
    </div>`;
    app.innerHTML = html;
    return;
  }

  const globalIdx = ALL_QUESTIONS.indexOf(q);
  const isAnswered = state.answered !== null;

  html += `<div class="q-card">
    <div class="q-meta">${q.topic} &mdash; ${q.type === 'tf' ? 'True / False' : 'Multiple Choice'} &mdash; Q${state.current+1} of ${state.deck.length}</div>
    <div class="q-text">${q.q}</div>`;

  if (q.type === 'tf') {
    const trueClass = isAnswered ? (q.a === true ? 'correct' : (state.answered === true ? 'wrong' : (q.a===true?'reveal':''))) : '';
    const falseClass = isAnswered ? (q.a === false ? 'correct' : (state.answered === false ? 'wrong' : (q.a===false?'reveal':''))) : '';
    html += `<div class="tf-row">
      <button class="opt ${trueClass}" onclick="answer(true)" ${isAnswered?'disabled':''}>True</button>
      <button class="opt ${falseClass}" onclick="answer(false)" ${isAnswered?'disabled':''}>False</button>
    </div>`;
  } else {
    html += `<div class="options">`;
    q.opts.forEach((opt, i) => {
      let cls = '';
      if (isAnswered) {
        if (i === q.a) cls = 'correct';
        else if (i === state.answered) cls = 'wrong';
      }
      html += `<button class="opt ${cls}" onclick="answer(${i})" ${isAnswered?'disabled':''}>${opt}</button>`;
    });
    html += `</div>`;
  }

  if (isAnswered) {
    html += `<div class="explanation">${q.exp}</div>`;
  }

  html += `</div>
  <div class="nav">
    ${isAnswered ? `<button onclick="next()">Next &rarr;</button>` : ''}
    <span class="nav-info">${state.current+1} / ${state.deck.length}</span>
  </div>`;

  app.innerHTML = html;
}

function answer(val) {
  if (state.answered !== null) return;
  const q = state.deck[state.current];
  const globalIdx = ALL_QUESTIONS.indexOf(q);
  state.answered = val;
  state.total++;
  const correct = (q.type === 'tf') ? val === q.a : val === q.a;
  if (correct) state.score++;
  else state.missed.add(globalIdx);
  render();
}

function next() {
  if (state.current < state.deck.length - 1) {
    state.current++;
    state.answered = null;
  } else {
    state.done = true;
  }
  render();
}

function setType(t) { state.typeFilter = t; buildDeck(); render(); }
function toggleShuffle() { state.shuffled = !state.shuffled; buildDeck(); render(); }
function toggleMissed() { state.missedOnly = !state.missedOnly; if(state.missedOnly && state.missed.size===0){state.missedOnly=false;} buildDeck(); render(); }
function resetQuiz() { state.score=0; state.total=0; state.missed=new Set(); state.done=false; buildDeck(); render(); }
function drillMissed() { state.missedOnly=true; buildDeck(); render(); }
function toggleTopic(t) {
  if (state.topicsOn.has(t)) { if(state.topicsOn.size>1) state.topicsOn.delete(t); }
  else state.topicsOn.add(t);
  buildDeck(); render();
}

buildDeck();
render();
</script>
